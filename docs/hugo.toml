baseURL = "https://eleccionesdb-api.spainelectoralproject.com"
languageCode = "es"
defaultContentLanguage = "es"
title = "EleccionesDB API"

[build]
  [build.buildStats]
    enable = true

[params]
  description = "API REST gratuita y abierta para consultar datos electorales de España."
  author = "Héctor Meleiro"
  github = "https://github.com/hmeleiro/eleccionesdb-api"
  parentProject = "https://spainelectoralproject.com/"
  etlSite = "https://hmeleiro.github.io/eleccionesdb-etl/"
  # URL base de la API. Cambiar a "http://localhost:8000" para desarrollo local.
  apiBaseURL = "https://api.spainelectoralproject.com"

[menus]
  [[menus.main]]
    name = "Inicio"
    pageRef = "/"
    weight = 10
  [[menus.main]]
    name = "Referencia API"
    pageRef = "/referencia/"
    weight = 20
  [[menus.main]]
    name = "Ejemplos"
    pageRef = "/ejemplos/"
    weight = 30
  [[menus.main]]
    name = "Datos y fuentes"
    pageRef = "/datos/"
    weight = 40
  [[menus.main]]
    name = "Desarrolladores"
    pageRef = "/developers/"
    weight = 50

[markup]
  [markup.highlight]
    style = "hrdark"
    lineNos = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
