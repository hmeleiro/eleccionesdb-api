{{ define "main" }}
  <article class="page-single">
    <div class="container">
      <div class="page-header">
        <h1>{{ .Title }}</h1>
        {{ with .Description }}
          <p class="page-desc">{{ . }}</p>
        {{ end }}
      </div>
      <div class="page-content">
        {{ .Content }}
      </div>
    </div>
  </article>
{{ end }}

{{ define "scripts" }}
  {{ partial "api-scripts.html" . }}
{{ end }}
