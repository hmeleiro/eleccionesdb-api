<!doctype html>
<html lang="{{ .Site.LanguageCode }}">
  <head>
    {{- partial "head.html" . -}}
  </head>

  <body data-api-base="{{ .Site.Params.apiBaseURL }}">
    {{- partial "header.html" . -}}
    <main id="content">
      {{- block "main" . }}{{ end -}}
    </main>
    {{- partial "footer.html" . -}}
    {{- block "scripts" . }}{{ end -}}
  </body>
</html>
